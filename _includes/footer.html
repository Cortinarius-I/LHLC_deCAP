{% assign c = site.data.contact %}
<footer class="footer">
<div class="footer-inner">
<div class="footer-contact-info">
  <p class="footer-contact-person"><a href="{{ "/contact/" | relative_url }}">Contact Us</a></p>
  <p class="footer-contact-details">
    <span class="footer-detail-item">
      <svg class="footer-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h12a1.5 1.5 0 0 1 1.5 1.5v9A1.5 1.5 0 0 1 16 16H4a1.5 1.5 0 0 1-1.5-1.5v-9zm1.5 0v.217l6 3.6 6-3.6V5.5a.5.5 0 0 0-.5-.5H4a.5.5 0 0 0-.5.5zm12.5 1.617-5.4 3.24a1 1 0 0 1-1.2 0L4 7.117V14.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V7.117z" fill="currentColor"/></svg>
      <a href="mailto:{{ c.email }}">{{ c.email }}</a>
    </span>
    <span class="footer-detail-item">
      <svg class="footer-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6.6 4a1 1 0 0 0-.92.614L4.3 7.6A12.38 12.38 0 0 0 11 14.3a12.38 12.38 0 0 0 3.4 1.4 1 1 0 0 0 1.114-.44l1.2-1.8a1 1 0 0 0-.28-1.36l-2.4-1.6a1 1 0 0 0-1.12.04l-.74.56a8.38 8.38 0 0 1-3.07-3.07l.56-.74a1 1 0 0 0 .04-1.12L8.06 4.28A1 1 0 0 0 7.2 4H6.6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <a href="tel:{{ c.phone | remove: ' ' }}">{{ c.phone }}</a>
    </span>
    {% assign alt = c.phone_alt | strip %}
    {% if alt != "" %}
    <span class="footer-detail-item">
      <svg class="footer-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6.6 4a1 1 0 0 0-.92.614L4.3 7.6A12.38 12.38 0 0 0 11 14.3a12.38 12.38 0 0 0 3.4 1.4 1 1 0 0 0 1.114-.44l1.2-1.8a1 1 0 0 0-.28-1.36l-2.4-1.6a1 1 0 0 0-1.12.04l-.74.56a8.38 8.38 0 0 1-3.07-3.07l.56-.74a1 1 0 0 0 .04-1.12L8.06 4.28A1 1 0 0 0 7.2 4H6.6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <a href="tel:{{ alt | remove: ' ' }}">{{ alt }}</a>
    </span>
    {% endif %}
  </p>
  <p class="footer-address">
    <svg class="footer-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M10 2a6 6 0 0 1 6 6c0 4-6 10-6 10S4 12 4 8a6 6 0 0 1 6-6zm0 4a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" fill="currentColor" opacity=".9"/></svg>
    {{ c.address }}
  </p>
</div>
<p class="footer-copy">&copy; {{ "now" | date: "%Y" }} {{ site.title }}</p>
</div>
</footer>
