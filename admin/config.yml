backend:
  name: github
  repo: Cortinarius-I/LHLC_deCAP
  branch: master
  base_url: https://lhlc-decap-oauth.deoreishanx.workers.dev
  auth_endpoint: /auth

media_folder: "assets/media"
public_folder: "/assets/media"

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Layout, name: layout, widget: hidden, default: default }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text }
              - { label: Video URL, name: video, widget: string, required: false, hint: "YouTube embed URL with autoplay params. Leave blank to use rotating background images instead." }
              - label: Background Images (when no video)
                name: bg_images
                widget: list
                required: false
                hint: "Up to 5 images that rotate in the hero background. Paste the Google Drive file ID for each (found in the sharing link)."
                fields:
                  - { label: Drive File ID, name: id, widget: string }
              - { label: Button Text, name: cta_text, widget: string, required: false }
              - { label: Button Link, name: cta_link, widget: string, required: false }
          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
              - { label: Description, name: description, widget: string }
          - label: Locations
            name: locations
            widget: list
            fields:
              - { label: Centre Name, name: name, widget: string }
              - { label: Age Range, name: ages, widget: string, hint: "e.g. Ages 3–15" }
              - { label: Timing, name: timing, widget: string, hint: "e.g. 9:30 AM to 2 PM", required: false }
              - { label: Address, name: address, widget: string }
          - label: About
            name: about
            widget: object
            fields:
              - { label: Our Journey, name: journey, widget: text }
              - { label: Why Little Hearts?, name: why, widget: text }
              - { label: Vision, name: vision, widget: string }
              - { label: Mission, name: mission, widget: text }
          - label: FAQs
            name: faqs
            widget: list
            hint: "Questions and answers shown in the FAQ section on the home page."
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

      - label: Support Us
        name: support
        file: support.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Layout, name: layout, widget: hidden, default: support }
          - { label: Financial Donation Content, name: body, widget: markdown, required: false, hint: "Optional — shown in the 'Support Us Financially' section. Leave blank to use the default placeholder text." }

      - label: Contact
        name: contact
        file: contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Layout, name: layout, widget: hidden, default: contact }

      - label: Our Team
        name: teachers
        file: teachers.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Layout, name: layout, widget: hidden, default: page }
          - label: Team Members
            name: team
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string }
              - label: Section
                name: section
                widget: select
                options:
                  - { label: Leadership, value: leadership }
                  - { label: Administration, value: administration }
                  - { label: Education, value: education }
                  - { label: Therapy, value: therapy }
                  - { label: Vocational Training, value: vocational-training }
                  - { label: Support, value: support }
              - { label: Bio, name: bio, widget: text, required: false, hint: "Optional — shown for leadership only." }
              - { label: Photo, name: photo, widget: image, required: false }

      - label: Gallery
        name: gallery
        file: gallery.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Layout, name: layout, widget: hidden, default: page }
          - label: Gallery Sections
            name: gallery_sections
            widget: list
            fields:
              - { label: Section Title, name: title, widget: string }
              - label: Images
                name: images
                widget: list
                fields:
                  - { label: Drive File ID, name: id, widget: string, hint: "Google Drive file ID from the sharing link" }
                  - { label: Caption, name: caption, widget: string, required: false }

  - name: activities
    label: Activities
    folder: _activities
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: select, options: ["Activities", "Workshops"] }
      - { label: "Image (upload)", name: image, widget: image, required: false, hint: "Upload an image directly. Used if no Drive ID is set below." }
      - { label: "Image (Drive ID)", name: drive_id, widget: string, required: false, hint: "Google Drive file ID. Right-click the file → Share → Copy link. The ID is the long string between /d/ and /view in the URL. Takes priority over uploaded image." }
      - { label: Layout, name: layout, widget: hidden, default: page }
      - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Settings
    files:
      - label: Donation Page
        name: donation
        file: _data/donation.yml
        fields:
          - { label: Page Title, name: title, widget: string }
          - { label: Page Subtitle, name: subtitle, widget: text }
          - name: org
            label: Organisation Details (used in receipts & emails)
            widget: object
            fields:
              - { label: Organisation Name, name: name, widget: string, hint: "Legal registered name (e.g. Dhristi Foundation)" }
              - { label: Address, name: address, widget: string }
              - { label: Organisation PAN, name: pan, widget: string, hint: "Required for 80G receipts." }
              - { label: Email, name: email, widget: string }
              - { label: Phone, name: phone, widget: string }
              - { label: Authorised Signatory, name: authorized_signatory, widget: string, hint: "Name and designation — appears on receipts." }
              - { label: Receipt Number Prefix, name: receipt_prefix, widget: string, hint: "Update at the start of each financial year. e.g. LHLC-2526- for FY 2025-26" }
              - { label: Receipt Email Subject, name: receipt_email_subject, widget: string }
          - { label: Apps Script URL, name: apps_script_url, widget: string, required: false, hint: "Deployed Google Apps Script web app URL. Paste after publishing the script as a web app." }
          - { label: Site URL, name: site_url, widget: string, hint: "Full URL of the live site, e.g. https://cortinarius-i.github.io/LHLC_deCAP — used by the Apps Script to fetch the receipt template." }
          - { label: Confirmation Form Intro, name: confirm_intro, widget: text, hint: "Text shown above the post-transfer confirmation form." }
          - name: indian_bank
            label: Indian Bank Account
            widget: object
            fields:
              - { label: Account Name, name: account_name, widget: string }
              - { label: Bank Name, name: bank_name, widget: string }
              - { label: Account Number, name: account_number, widget: string }
              - { label: IFSC Code, name: ifsc_code, widget: string }
              - { label: Branch, name: branch, widget: string }
              - { label: UPI ID, name: upi_id, widget: string, required: false }
              - { label: UPI QR Image, name: upi_qr_image, widget: image, required: false, hint: "Upload UPI QR code image. Leave blank if not applicable." }
          - name: fcra_bank
            label: FCRA Bank Account (Foreign Donations)
            widget: object
            fields:
              - { label: Account Name, name: account_name, widget: string }
              - { label: Bank Name, name: bank_name, widget: string }
              - { label: Account Number, name: account_number, widget: string }
              - { label: IFSC Code, name: ifsc_code, widget: string }
              - { label: Branch, name: branch, widget: string }
              - { label: SWIFT Code, name: swift_code, widget: string }
              - { label: FCRA Registration Number, name: fcra_registration_number, widget: string }
              - { label: Purpose Code, name: purpose_code, widget: string, default: "P1302" }
          - name: tax_80g
            label: 80G Tax Benefit
            widget: object
            fields:
              - { label: 80G Registration Number, name: registration_number, widget: string }
              - { label: Valid From, name: valid_from, widget: string, hint: "e.g. 2024-04-01" }
              - { label: Valid To, name: valid_to, widget: string, hint: "e.g. 2029-03-31" }
              - { label: Description, name: note, widget: text }
          - name: tax_fcra
            label: FCRA Receipt Note
            widget: object
            fields:
              - { label: Note, name: note, widget: text }
          - name: general
            label: General Donation
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - name: suggested_amounts
                label: Suggested Amounts
                widget: list
                fields:
                  - { label: Amount (₹), name: amount, widget: number }
                  - { label: Label, name: label, widget: string }
          - name: sponsor_student
            label: Sponsor a Student
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Annual Cost (₹), name: annual_cost, widget: number }
              - { label: Suggested Monthly Amount (₹), name: suggested_amount, widget: number }
              - { label: Suggested Amount Label, name: suggested_label, widget: string }
              - name: breakdown
                label: Cost Breakdown
                widget: list
                fields:
                  - { label: Item, name: item, widget: string }
                  - { label: Annual Cost (₹), name: amount, widget: number }
          - name: sponsor_event
            label: Sponsor an Event
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Call-to-Action Note, name: note, widget: text }
              - { label: Contact Person, name: contact_person, widget: string }
              - { label: Contact Phone, name: contact_phone, widget: string }
              - name: sample_events
                label: Sample Events
                widget: list
                fields:
                  - { label: Event Name, name: name, widget: string }
                  - { label: Typical Cost (₹), name: typical_cost, widget: number }
          - name: corpus_fund
            label: Corpus Fund
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Annual Operating Cost (₹), name: annual_operating_cost, widget: number }
              - name: suggested_amounts
                label: Suggested Amounts
                widget: list
                fields:
                  - { label: Amount (₹), name: amount, widget: number }
                  - { label: Tier Label, name: label, widget: string }
              - name: breakdown
                label: Expense Breakdown
                widget: list
                fields:
                  - { label: Expense Item, name: item, widget: string }
                  - { label: Annual Cost (₹), name: amount, widget: number }
          - name: infrastructure
            label: Infrastructure Fund
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - name: suggested_amounts
                label: Suggested Amounts
                widget: list
                fields:
                  - { label: Amount (₹), name: amount, widget: number }
                  - { label: Label, name: label, widget: string }
              - name: current_needs
                label: Current Infrastructure Needs
                widget: list
                fields:
                  - { label: Need, name: item, widget: string }
                  - { label: Estimated Cost (₹), name: amount, widget: number }
                  - { label: Description, name: description, widget: string }

      - label: Contact & Form Settings
        name: contact
        file: _data/contact.yml
        fields:
          - { label: Contact Person, name: contact_person, widget: string }
          - { label: Email, name: email, widget: string, hint: "The email address that receives form submissions." }
          - { label: Phone, name: phone, widget: string }
          - { label: Alternate Phone, name: phone_alt, widget: string, required: false }
          - { label: Address, name: address, widget: string }
          - { label: Form Endpoint (Google Apps Script URL), name: form_endpoint, widget: string, required: false, hint: "Paste the Google Apps Script web app URL here after deployment. See scripts/contact-apps-script.js for setup instructions." }
          - { label: Admissions Info, name: admissions_info, widget: text, hint: "Short paragraph shown above the admissions form fields." }
          - { label: Volunteer Info, name: volunteer_info, widget: text, hint: "Short paragraph shown above the volunteer form fields." }
          - label: Volunteer Areas
            name: volunteer_areas
            widget: list
            hint: "Skills and areas you are seeking volunteer help with."
            fields:
              - { label: Area / Skill, name: area, widget: string }
          - { label: Careers Info, name: careers_info, widget: text, hint: "Short paragraph shown above the careers form fields." }
          - { label: Collaborations Info, name: collaborations_info, widget: text, hint: "Short paragraph shown above the collaborations form field." }

  - name: testimonials
    label: Testimonials
    folder: _testimonials
    create: true
    slug: "{{fields.parent_name | slugify}}"
    fields:
      - { label: Layout, name: layout, widget: hidden, default: testimonial }
      - { label: Title, name: title, widget: string, hint: "e.g. Testimonial — Supriya Anchan" }
      - { label: Parent / Author Name, name: parent_name, widget: string }
      - { label: Student Name, name: student_name, widget: string }
      - { label: Date Joined, name: date_joined, widget: string, required: false, hint: "e.g. June 2017" }
      - label: Role
        name: role
        widget: select
        options:
          - { label: Parent, value: parent }
          - { label: Donor, value: donor }
          - { label: Volunteer, value: volunteer }
      - { label: Excerpt, name: excerpt, widget: text, hint: "One or two sentences shown on the home page slider. Clicking it opens this full page." }
      - { label: Full Testimonial, name: body, widget: markdown }
